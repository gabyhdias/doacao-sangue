<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Captação de Dados para Doação de Sangue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <img id="doacao" src="assets/image-removebg-preview (1).png" alt="doacao">
    
      <div class="h1">
      <h1>Formulário de Doação de Sangue</h1>
      </div>
   </div>
</header>

    <div class="a">
    <form id="formDoacao">
    <br>
    <label for="nome">Nome Completo:</label>
    <input type="text" id="nome" placeholder="Digite seu nome" required>
    <br>
    <br>
    <label for="email">Email:</label>
    <input type="email" id="email" placeholder="Digite seu email" required>
    <br>
    <br>
    <label for="idade">Idade:</label>
    <input type="text" id="idade" placeholder="Digite sua idade" required>
    <br>
    <br>
    <label for="peso">Peso:</label>
    <input type="text" id="peso" placeholder="Digite seu peso" required>
    <br>
    <br>
    
     <label for="tipoSanguineo"> Tipo sanguíneo: </label>
                <select name="tipoSanguineo" id="tipoSanguineo" required> 
                    <option value=""> Selecione </option>
                    <option value="tipoSanguineo"> A+ </option>
                    <option value="tipoSanguineo"> A- </option>
                    <option value="tipoSanguineo"> B+ </option>
                    <option value="tipoSanguineo"> B- </option>
                    <option value="tipoSanguineo"> AB+ </option>
                    <option value="tipoSanguineo"> AB- </option>
                    <option value="tipoSanguineo"> O+ </option>
                    <option value="tipoSanguineo"> O- </option>
                </select>
    <br>
    <br>

    <label for="telefone">Telefone:</label>
    <input type="number" id="telefone" placeholder="Digite seu telefone" required>
    <br>
    <br>
    <label for="cidade">Cidade:</label>
    <input type="text" id="cidade" placeholder="Digite sua cidade" required>
    <br>
    <br>
    <label for="estado">Estado:</label>
    <input type="text" id="estado" placeholder="Digite seu estado" required>
    <br>
    <br>

    <button type="submit">Enviar</button>
    </form>

    <div>
    <img src="assets/image-removebg-preview (2).png" alt="imagemFofa" class="imagemFofa">
    </div>

</body>
</html>
